<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <rect width="100%" height="100%" fill="#fff"/>
  <g font-family="Inter, Arial, sans-serif" fill="#2D3436">
    <!-- Morning circle -->
    <g transform="translate(40,40)">
      <rect width="220" height="220" rx="18" fill="#F9F7F2" stroke="#E9E6E2"/>
      <circle cx="110" cy="80" r="36" fill="#7D8C7B"/>
      <text x="110" y="135" font-size="18" fill="#64707a" text-anchor="middle">Morning circle &"</text>
      <text x="110" y="155" font-size="18" fill="#64707a" text-anchor="middle">language time</text>
    </g>

    <!-- Hands-on exploration -->
    <g transform="translate(280,40)">
      <rect width="220" height="220" rx="18" fill="#F9F7F2" stroke="#E9E6E2"/>
      <g transform="translate(70,40)">
        <rect x="0" y="40" width="80" height="30" rx="6" fill="#B89470"/>
        <rect x="20" y="10" width="40" height="40" rx="8" fill="#7D8C7B"/>
      </g>
      <text x="110" y="190" font-size="18" fill="#64707a" text-anchor="middle">Hands‑on exploration</text>
      <text x="110" y="210" font-size="18" fill="#64707a" text-anchor="middle">& sensory play</text>
    </g>

    <!-- Outdoor nature walks -->
    <g transform="translate(520,40)">
      <rect width="220" height="220" rx="18" fill="#F9F7F2" stroke="#E9E6E2"/>
      <g transform="translate(80,50)">
        <circle cx="20" cy="20" r="12" fill="#B89470"/>
        <rect x="40" y="10" width="60" height="24" rx="6" fill="#7D8C7B"/>
      </g>
      <text x="110" y="170" font-size="18" fill="#64707a" text-anchor="middle">Outdoor nature walks</text>
      <text x="110" y="190" font-size="18" fill="#64707a" text-anchor="middle">& gardening</text>
    </g>

    <!-- Small group projects -->
    <g transform="translate(760,40)">
      <rect width="220" height="220" rx="18" fill="#F9F7F2" stroke="#E9E6E2"/>
      <g transform="translate(90,50)">
        <rect x="0" y="0" width="30" height="30" rx="5" fill="#7D8C7B"/>
        <rect x="40" y="10" width="40" height="24" rx="6" fill="#B89470"/>
      </g>
      <text x="110" y="170" font-size="18" fill="#64707a" text-anchor="middle">Small group creative</text>
      <text x="110" y="190" font-size="18" fill="#64707a" text-anchor="middle">projects</text>
    </g>

    <text x="40" y="320" font-size="22" font-weight="600" fill="#2D3436">Daily Routine</text>
  </g>
</svg>
